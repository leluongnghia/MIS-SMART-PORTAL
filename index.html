<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ thống Giáo dục Đa Trí Tuệ MIS</title>
    <meta name="description" content="Cổng thông tin thông minh quản lý công việc học vụ, mục tiêu OKRs và học liệu số MIS LMS dành riêng cho Trường Phổ thông Liên cấp Đa Trí Tuệ (MIS) Hà Nội." />
    <meta name="keywords" content="MIS Hà Nội, Đa Trí Tuệ, MIS LMS, quản lý công việc trường học, OKRs học đường, giáo dục thông minh" />
    <link rel="icon" type="image/png" href="https://misvn.edu.vn/wp-content/uploads/2021/11/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchOverride = originalFetch;

          function setupProp(obj) {
            try {
              Object.defineProperty(obj, 'fetch', {
                get: function() { return fetchOverride; },
                set: function(v) { fetchOverride = v; },
                configurable: true,
                enumerable: true
              });
              return true;
            } catch (e) {
              return false;
            }
          }

          // Try redefining on window first
          if (!setupProp(window)) {
            // If that fails, try Window.prototype
            if (typeof Window !== 'undefined' && Window.prototype) {
              setupProp(Window.prototype);
            }
          }
          
          // Also try redefining on globalThis if possible
          if (typeof globalThis !== 'undefined' && globalThis !== window) {
            setupProp(globalThis);
          }
          // Also self
          if (typeof self !== 'undefined' && self !== window) {
            setupProp(self);
          }
        } catch (e) {
          console.warn("Could not patch fetch getter/setter:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
