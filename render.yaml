services:
  - type: web
    name: mis-smart-portal
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false  # Nhập thủ công trên Render Dashboard
      - key: APP_URL
        sync: false  # URL do Render cấp, nhập sau khi deploy
      - key: SMTP_HOST
        sync: false  # SMTP host của nhà cung cấp email, ví dụ smtp.gmail.com
      - key: SMTP_PORT
        sync: false  # Cổng SMTP, thường là 587 hoặc 465
      - key: SMTP_SECURE
        sync: false  # true nếu dùng cổng 465, false nếu dùng 587/TLS
      - key: SMTP_USER
        sync: false  # Tài khoản SMTP
      - key: SMTP_PASS
        sync: false  # Mật khẩu SMTP hoặc app password
      - key: EMAIL_FROM
        sync: false  # Tên/người gửi, ví dụ "MIS Smart Portal <noreply@mis.edu.vn>"
      - key: ZALO_OA_ID
        sync: false  # Zalo Official Account ID
      - key: ZALO_APP_ID
        sync: false  # Zalo app id dùng cho OA/OpenAPI
      - key: ZALO_APP_SECRET
        sync: false  # Zalo app secret, chỉ nhập trên Render
      - key: ZALO_ACCESS_TOKEN
        sync: false  # Access token OA/Zalo API
      - key: ZALO_REFRESH_TOKEN
        sync: false  # Refresh token để làm mới access token khi triển khai gửi tự động
      - key: ZALO_DEFAULT_AUDIENCE
        value: "Người quan tâm OA"
      - key: MAX_EMAIL_REMINDERS_PER_RUN
        value: "5"
      - key: MAX_CAMPAIGN_EMAILS_PER_RUN
        value: "20"
